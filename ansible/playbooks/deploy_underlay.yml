---
- name: Deploy Underlay BGP (Phase 1)
  hosts: all
  gather_facts: false
  tasks:
    # 1. デーモン設定 (zebra, bgpd を確実に有効化)
    - name: Force enable BGP daemon
      copy:
        dest: /etc/frr/daemons
        content: |
          zebra=yes
          bgpd=yes
        owner: frr
        group: frr
        mode: '0644'

    # 2. OSレベルでインターフェースを叩き起こす (これが「落ちる」対策)
    - name: Ensure interfaces are UP in OS
      raw: "ip link set {{ item.intf }} up"
      loop: "{{ nodes[inventory_hostname].peers }}"
      ignore_errors: yes

    # 3. コンフィグ流し込み
    - name: Deploy frr.conf
      template:
        src: ../roles/frr/templates/frr.conf.j2
        dest: /etc/frr/frr.conf
        owner: frr
        group: frr
        mode: '0644'

    # 4. FRR の再起動をやめ、設定の「リロード」に変更
    - name: Reload FRR configuration
      raw: vtysh -f /etc/frr/frr.conf
      # これならコンテナは死なず、配線も維持されます

    # 5. bgpdの起動
    - name: Ensure bgpd is running (Manual start if missing)
      raw: pgrep bgpd || /usr/lib/frr/bgpd -d -f /etc/frr/frr.conf

    # 7. Linux Bridge と VXLAN インターフェースの作成 と AnycastGWの作成（複数VNI用）
    - name: Setup VXLAN and Anycast GW
      when: "'leafs' in group_names"
      raw: |
        # ブリッジ作成
        {% for v in overlay %}
        ip link add {{ v.bridge }} type bridge || true
        # 全ての Leaf で共通の仮想 MAC を設定
        ip link set {{ v.bridge }} address 00:00:5e:00:01:01 
        ip link set {{ v.bridge }} up
        
        # VXLAN インターフェース作成
        ip link add {{ v.vxlan }} type vxlan id {{ v.vni }} local {{ nodes[inventory_hostname].lo0 }} dstport 4789 || true
        
        # VXLAN をブリッジに収容
        ip link set {{ v.vxlan }} master {{ v.bridge }}
        ip link set {{ v.vxlan }} up
        {% endfor %}
        
        # Leaf1 のポート収容
        {% if inventory_hostname == 'leaf1' %}
        ip link set eth2 master br10 || true
        ip link set eth2 up
        {% endif %}
        
        # Leaf2 のポート収容
        {% if inventory_hostname == 'leaf2' %}
        ip link set eth2 master br10 || true
        ip link set eth4 master br20 || true
        ip link set eth2 up
        ip link set eth3 up
        {% endif %}
      ignore_errors: yes