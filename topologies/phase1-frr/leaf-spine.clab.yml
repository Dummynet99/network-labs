name: phase1-frr

topology:
  nodes:
    # Spine
    spine1:
      kind: linux
      image: frrouting/frr:latest
    # Leaf
    leaf1:
      kind: linux
      image: frrouting/frr:latest
    leaf2:
      kind: linux
      image: frrouting/frr:latest
    client1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.10.10.1/24 dev eth1
        - ip link set eth1 up
    client2:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.10.10.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["client1:eth1", "leaf1:eth2"]
    - endpoints: ["client2:eth1", "leaf2:eth2"]