# 共通設定
bgp_asn_spine: 65000

# ノードごとの個別設定（本来は host_vars に分けるのが理想ですが、最初はここで一括管理）
nodes:
  spine1:
    asn: 65000
    lo0: 10.0.0.100
    peers:
      - { name: leaf1, remote_asn: 65001, my_ip: 192.168.1.0, peer_ip: 192.168.1.1, intf: eth1 }
      - { name: leaf2, remote_asn: 65002, my_ip: 192.168.1.2, peer_ip: 192.168.1.3, intf: eth2 }
  spine2:
    asn: 65000
    lo0: 10.0.0.200
    peers:
      - { name: leaf1, remote_asn: 65001, my_ip: 192.168.1.4, peer_ip: 192.168.1.5, intf: eth1 }
      - { name: leaf2, remote_asn: 65002, my_ip: 192.168.1.6, peer_ip: 192.168.1.7, intf: eth2 }

  leaf1:  
    asn: 65001
    lo0: 10.0.0.1
    peers:
      - { name: spine1, remote_asn: 65000, my_ip: 192.168.1.1, peer_ip: 192.168.1.0, intf: eth1 }
      - { name: spine2, remote_asn: 65000, my_ip: 192.168.1.5, peer_ip: 192.168.1.4, intf: eth3 }
  leaf2:
    asn: 65002
    lo0: 10.0.0.2
    peers:
      - { name: spine1, remote_asn: 65000, my_ip: 192.168.1.3, peer_ip: 192.168.1.2, intf: eth1 }
      - { name: spine2, remote_asn: 65000, my_ip: 192.168.1.7, peer_ip: 192.168.1.6, intf: eth3 }

overlay:
  - vni: 10
    bridge: br10
    vxlan: vx10
    gw_ip: 10.10.10.254/24
  - vni: 20
    bridge: br20
    vxlan: vx20
    gw_ip: 10.10.20.254/24