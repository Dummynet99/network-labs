---
- name: Deploy Underlay BGP (Phase 1)
  hosts: all
  gather_facts: false
  tasks:
    # 1. デーモン設定 (zebra, bgpd を確実に有効化)
    - name: Force enable BGP daemon
      copy:
        dest: /etc/frr/daemons
        content: |
          zebra=yes
          bgpd=yes
        owner: frr
        group: frr
        mode: '0644'

    # 2. OSレベルでインターフェースを叩き起こす (これが「落ちる」対策)
    - name: Ensure interfaces are UP in OS
      raw: "ip link set {{ item.intf }} up"
      loop: "{{ nodes[inventory_hostname].peers }}"
      ignore_errors: yes

    # 3. コンフィグ流し込み
    - name: Deploy frr.conf
      template:
        src: ../roles/frr/templates/frr.conf.j2
        dest: /etc/frr/frr.conf
        owner: frr
        group: frr
        mode: '0644'

    # 4. FRR の再起動をやめ、設定の「リロード」に変更
    - name: Reload FRR configuration
      raw: vtysh -f /etc/frr/frr.conf
      # これならコンテナは死なず、配線も維持されます

    # 5. bgpdの起動
    - name: Ensure bgpd is running (Manual start if missing)
      raw: pgrep bgpd || /usr/lib/frr/bgpd -d -f /etc/frr/frr.conf

    # 6. Linux Bridge と VXLAN インターフェースの作成 (Leaf のみ実行)
    - name: Create VXLAN and Bridge on Leafs
      when: "'leafs' in group_names"
      raw: |
        # ブリッジ作成
        ip link add {{ overlay.bridge_name }} type bridge
        ip link set {{ overlay.bridge_name }} up
        # VXLAN インターフェース作成 (VNI 10, VTEP Source は Loopback)
        ip link add {{ overlay.vxlan_intf }} type vxlan id {{ overlay.vni }} local {{ nodes[inventory_hostname].lo0 }} dstport 4789
        # VXLAN をブリッジに収容
        ip link set {{ overlay.vxlan_intf }} master {{ overlay.bridge_name }}
        ip link set {{ overlay.vxlan_intf }} up
        # クライアントが繋がっている eth2 をブリッジに接続
        ip link set eth2 master {{ overlay.bridge_name }}
        ip link set eth2 up
      ignore_errors: yes